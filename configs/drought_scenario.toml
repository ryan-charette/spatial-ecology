[project]
scenario_name = "drought_disturbance"

[simulation]
steps = 200
seed = 1337
trials = 25
rows = 8
cols = 8

[initial_conditions]
prey = 100.0
predators = 20.0
vegetation = 500.0
rainfall = 1.0
temperature = 21.0
disease_pressure = 0.0

[biology]
vegetation_growth_rate = 0.045
vegetation_grazing_rate = 0.03
prey_birth_rate = 0.04
prey_death_rate = 0.012
predation_rate = 0.001
predator_conversion_efficiency = 0.10
predator_death_rate = 0.02
carrying_capacity = 1000.0
optimal_temperature = 20.0
temperature_tolerance = 18.0

[migration]
prey_migration_rate = 0.025
predator_migration_rate = 0.012
fragmentation_rate = 0.15
scarcity_threshold = 0.25
scarcity_migration_multiplier = 1.6

[environment]
drought_probability = 0.08
drought_vegetation_loss = 0.35
disease_probability = 0.015
disease_prey_mortality = 0.15
temperature_anomaly_probability = 0.01
temperature_anomaly_width = 7.0
baseline_temperature = 21.0
habitat_disturbance_probability = 0.004
habitat_disturbance_loss = 0.25

[thresholds]
prey_extinction_threshold = 1.0
predator_extinction_threshold = 1.0

[output]
results_csv = "results/drought_scenario.csv"
summary_csv = "results/drought_summary.csv"
