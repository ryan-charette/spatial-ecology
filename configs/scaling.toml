[project]
scenario_name = "scaling_benchmark_40x40"

[simulation]
steps = 100
seed = 2026
trials = 1
rows = 40
cols = 40

[execution]
mode = "parallel"
workers = 4
benchmark = true
validate = true

[initial_conditions]
prey = 100.0
predators = 20.0
vegetation = 500.0
rainfall = 1.0
temperature = 20.0
disease_pressure = 0.0

[biology]
vegetation_growth_rate = 0.05
vegetation_grazing_rate = 0.03
prey_birth_rate = 0.04
prey_death_rate = 0.01
predation_rate = 0.001
predator_conversion_efficiency = 0.10
predator_death_rate = 0.02
carrying_capacity = 1000.0
optimal_temperature = 20.0
temperature_tolerance = 18.0

[migration]
prey_migration_rate = 0.04
predator_migration_rate = 0.02
fragmentation_rate = 0.05
scarcity_threshold = 0.25
scarcity_migration_multiplier = 1.5

[environment]
drought_probability = 0.01
drought_vegetation_loss = 0.20
disease_probability = 0.005
disease_prey_mortality = 0.10
temperature_anomaly_probability = 0.002
temperature_anomaly_width = 4.0
baseline_temperature = 20.0
habitat_disturbance_probability = 0.001
habitat_disturbance_loss = 0.10

[thresholds]
prey_extinction_threshold = 1.0
predator_extinction_threshold = 1.0

[output]
results_csv = "results/scaling_patch_timeseries.csv"
summary_csv = "results/scaling_summary.csv"
timestep_metrics_csv = "results/scaling_timestep_metrics.csv"
worker_metrics_csv = "results/scaling_worker_metrics.csv"
benchmark_csv = "results/benchmarks/scaling.csv"
